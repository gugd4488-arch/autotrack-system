version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: autotrack2026
      MYSQL_DATABASE: autotrack
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  server:
    build: ./server
    ports:
      - "8082:8082"
      - "5055:5055"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_NAME: autotrack
      DB_USER: root
      DB_PASS: autotrack2026
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8"
      SERVER_SERVLET_ENCODING_CHARSET: UTF-8
      SERVER_SERVLET_ENCODING_FORCE: "true"
      SERVER_SERVLET_ENCODING_FORCE_REQUEST: "true"
      SERVER_SERVLET_ENCODING_FORCE_RESPONSE: "true"

volumes:
  mysql_data:
